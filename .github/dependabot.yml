version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    reviewers:
      - "project-maintainers"
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@testing-library/*"
          - "eslint*"
          - "prettier"
          - "vitest"
      production-dependencies:
        patterns:
          - "@supabase/*"
          - "react*"
          - "@tanstack/*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]