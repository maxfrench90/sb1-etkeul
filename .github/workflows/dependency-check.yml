name: Dependency Check

on:
  schedule:
    - cron: '0 0 * * *' # Run daily
  workflow_dispatch: # Allow manual trigger

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run dependency checks
        run: node scripts/dependency-check.js
      
      - name: Run security audit
        run: npm audit
      
      - name: Check for outdated packages
        run: |
          OUTDATED=$(npm outdated --json)
          echo "Outdated packages: $OUTDATED"
          if [ "$OUTDATED" != "{}" ]; then
            echo "::warning::Outdated packages found"
          fi
      
      - name: Create issue for outdated dependencies
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const outdated = process.env.OUTDATED;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Outdated Dependencies Found',
              body: `Dependency check found outdated packages:\n\n\`\`\`json\n${outdated}\n\`\`\`\n\nPlease review and update as needed.`,
              labels: ['dependencies']
            });